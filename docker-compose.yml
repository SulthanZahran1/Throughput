services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: throughput
      POSTGRES_USER: throughput
      POSTGRES_PASSWORD: throughput
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U throughput"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://throughput:throughput@db:5432/throughput?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
